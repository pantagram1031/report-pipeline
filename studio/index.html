<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="studio-action-token" content="__STUDIO_ACTION_TOKEN__">
<title>Rigorloom Studio</title>
<style>
:root{color-scheme:light dark;--bg:#eef2f6;--panel:#fff;--soft:#f4f6f9;--ink:#17212b;--muted:#657386;--line:#dce3ea;--accent:#087f73;--ok:#087f5b;--warn:#a66200;--bad:#c92a2a;--shadow:0 14px 45px #24334218}
html[data-theme="dark"]{--bg:#071018;--panel:#0d1924;--soft:#111f2c;--ink:#edf4f7;--muted:#90a1b2;--line:#263746;--accent:#53d6c2;--ok:#55d99f;--warn:#ffc66d;--bad:#ff8188;--shadow:0 18px 55px #0007}
@media(prefers-color-scheme:dark){html:not([data-theme="light"]){--bg:#071018;--panel:#0d1924;--soft:#111f2c;--ink:#edf4f7;--muted:#90a1b2;--line:#263746;--accent:#53d6c2;--ok:#55d99f;--warn:#ffc66d;--bad:#ff8188;--shadow:0 18px 55px #0007}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif}button{font:inherit}.shell{max-width:1280px;margin:auto;padding:28px}.top{display:flex;align-items:center;gap:14px;margin-bottom:24px}.brand{font-size:22px;font-weight:760}.brand small{display:block;color:var(--muted);font:11px ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase}.spacer{flex:1}.button{border:1px solid var(--line);border-radius:8px;padding:8px 12px;background:var(--panel);color:var(--ink);cursor:pointer}.button:hover{border-color:var(--accent)}.button.primary{background:var(--accent);color:#061310;border-color:transparent;font-weight:700}.button.danger{color:var(--bad)}.mode{padding:5px 9px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font:11px ui-monospace,monospace}.mode.on{color:var(--warn);border-color:var(--warn)}h1,h2,h3{line-height:1.2;margin:0}h1{font-size:29px;margin-bottom:7px}.sub{color:var(--muted);margin-bottom:23px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:14px}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow)}.card{padding:17px;cursor:pointer;transition:.14s transform,.14s border-color}.card:hover,.card.selected{transform:translateY(-2px);border-color:var(--accent)}.card-head{display:flex;gap:10px;align-items:start}.slug{font:650 15px ui-monospace,monospace;overflow-wrap:anywhere}.lint{margin-left:auto;padding:3px 7px;border-radius:999px;font:10px ui-monospace,monospace;background:var(--soft);white-space:nowrap}.lint.ok{color:var(--ok)}.lint.off{color:var(--bad)}.lint.na{color:var(--muted)}.progress{height:6px;border-radius:9px;background:var(--soft);overflow:hidden;margin:15px 0 8px}.progress span{display:block;height:100%;background:var(--accent)}.row{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;margin-top:7px}.row b{color:var(--ink);font-weight:600;text-align:right}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.badge{padding:3px 7px;border-radius:5px;background:var(--soft);color:var(--muted);font:11px ui-monospace,monospace}.badge.gate{color:var(--warn)}.badge.auto{color:var(--bad)}.hard-list{margin:9px 0 0;padding-left:18px;color:var(--bad);font-size:11px}.empty{padding:50px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:13px}.detail{display:none}.detail.show{display:block}.detail-head{display:flex;gap:12px;align-items:center;margin-bottom:18px}.detail-title{font:700 20px ui-monospace,monospace}.columns{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(300px,.8fr);gap:15px}.panel{padding:17px;margin-bottom:15px;box-shadow:none}.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:13px}.stage{display:grid;grid-template-columns:45px 1fr auto;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);align-items:center}.stage:last-child{border:0}.stage-num{font:12px ui-monospace,monospace;color:var(--muted)}.stage-state{font:10px ui-monospace,monospace;text-transform:uppercase}.stage-state.done{color:var(--ok)}.stage-state.active{color:var(--warn)}.stage-state.blocked{color:var(--bad)}.receipt{padding:10px 0;border-bottom:1px solid var(--line)}.receipt:last-child{border:0}.receipt code,.result{display:block;white-space:pre-wrap;overflow-wrap:anywhere;background:var(--soft);padding:8px;border-radius:7px;margin-top:6px;font:11px/1.45 ui-monospace,monospace}.meta{color:var(--muted);font-size:11px;margin-top:5px}.viewer{width:100%;height:620px;border:1px solid var(--line);border-radius:9px;background:white}.pdf-page{width:100%;display:block;border:1px solid var(--line);margin:0 0 10px;border-radius:6px}.events{max-height:440px;overflow:auto}.event{padding:9px 0;border-bottom:1px solid var(--line)}.event:last-child{border:0}.event time{display:block;color:var(--muted);font:10px ui-monospace,monospace}.event pre{white-space:pre-wrap;margin:4px 0 0;font:11px ui-monospace,monospace}.actions{display:flex;gap:8px;flex-wrap:wrap}.action-result{margin-top:12px}.human-round{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}.hold{color:var(--bad);margin-top:8px}.kbd{font:11px ui-monospace,monospace;color:var(--muted)}[hidden]{display:none!important}
@media(max-width:850px){.shell{padding:18px}.columns{grid-template-columns:1fr}.viewer{height:460px}}
</style>
</head>
<body>
<main class="shell">
  <header class="top"><div class="brand">Rigorloom Studio<small>local workspace instrument</small></div><span id="action-mode" class="mode"></span><div class="spacer"></div><span class="kbd">j/k navigate</span><button id="theme" class="button" type="button">Theme</button></header>
  <section id="dashboard">
    <h1>Workspaces</h1><p class="sub">Live pipeline state, gate provenance, deliverables, and conformance.</p>
    <div id="cards" class="grid"></div>
  </section>
  <section id="detail" class="detail">
    <div class="detail-head"><button id="back" class="button" type="button">? All workspaces</button><div id="detail-title" class="detail-title"></div><div class="spacer"></div><button id="pause" class="button" type="button">Pause events</button></div>
    <div class="columns"><div>
      <section class="panel"><h3>Stage progress</h3><div id="stages"></div></section>
      <section id="deliverable-panel" class="panel"><h3>Deliverable preview</h3><div id="deliverable"></div></section>
      <section id="pdf-panel" class="panel"><h3>PDF viewer</h3><div id="pdf"></div></section>
    </div><aside>
      <section class="panel"><h3>Gate provenance</h3><div id="gate-checks"></div></section>
      <section class="panel"><h3>Humanization</h3><div id="humanization"></div></section>
      <section id="actions-panel" class="panel" hidden><h3>Actions</h3><div id="actions" class="actions"></div><div id="action-result" class="action-result"></div></section>
      <section class="panel"><h3>Events ? 5 second poll</h3><div id="events" class="events"></div></section>
    </aside></div>
  </section>
  <span id="copy-approval" hidden></span><span id="readiness-body" hidden></span><span id="mission-stats" hidden></span>
</main>
<script>
const boot=__STUDIO_BOOTSTRAP__;
const actionToken=document.querySelector('meta[name="studio-action-token"]')?.getAttribute("content")||"";
const $=id=>document.getElementById(id);
const esc=value=>String(value??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
let workspaces=boot.workspaces||[],selected=-1,slug=null,paused=false,eventOffset=0,pollTimer=null,currentState=null;

function lintHtml(lint){
  lint=lint||{state:"na",label:"lint n/a",hard:[]};
  const hard=(lint.hard||[]).map(x=>`<li>${esc(x)}</li>`).join("");
  return `<span class="lint ${esc(lint.state)}">${esc(lint.label)}</span>${hard?`<ul class="hard-list">${hard}</ul>`:""}`;
}
function renderCards(){
  const box=$("cards");
  if(!workspaces.length){box.innerHTML='<div class="empty">No report workspaces found.</div>';return;}
  box.innerHTML=workspaces.map((w,i)=>{
    const pct=w.total?Math.round(w.done/w.total*100):0;
    const gate=w.pending_gate?`<span class="badge gate">${esc(w.pending_gate.name)} ? ${esc(w.pending_gate.type)}</span>`:"";
    const auto=w.auto_approved?`<span class="badge auto">${w.auto_approved} auto-approved</span>`:"";
    return `<article class="card ${i===selected?"selected":""}" data-index="${i}" tabindex="0"><div class="card-head"><div class="slug">${esc(w.slug)}</div>${lintHtml(w.lint)}</div><div class="progress"><span style="width:${pct}%"></span></div><div class="row"><span>Progress</span><b>${w.done}/${w.total}</b></div><div class="row"><span>Current</span><b>${esc(w.current_stage||"")} ${esc(w.current_label)}</b></div><div class="row"><span>Last event</span><b>${esc(w.last_event||"none")}</b></div><div class="badges">${gate}${auto}</div></article>`;
  }).join("");
  document.querySelectorAll(".card").forEach(card=>{card.onclick=()=>openWorkspace(Number(card.dataset.index));card.onkeydown=e=>{if(e.key==="Enter")openWorkspace(Number(card.dataset.index));};});
}
function openWorkspace(index){selected=index;slug=workspaces[index].slug;renderCards();$("dashboard").hidden=true;$("detail").classList.add("show");$("detail-title").textContent=slug;eventOffset=0;$("events").innerHTML="";loadDetail();startPolling();}
function closeDetail(){$("detail").classList.remove("show");$("dashboard").hidden=false;slug=null;stopPolling();}

async function json(url,options){const response=await fetch(url,options);if(!response.ok)throw new Error(`${response.status} ${response.statusText}`);return response.json();}
async function loadDetail(){
  try{
    const [state,checks,human]=await Promise.all([json(`/workspace/${slug}/state`),json(`/workspace/${slug}/gate-checks`),json(`/workspace/${slug}/humanization`)]);
    currentState=state;renderStages(state);renderChecks(checks);renderHumanization(human);renderPdf(state);await renderDeliverable();renderActions();await loadEvents();
  }catch(error){$("stages").innerHTML=`<div class="empty">${esc(error.message)}</div>`;}
}
function renderStages(state){$("stages").innerHTML=(state.stages||[]).map(s=>`<div class="stage"><span class="stage-num">${esc(s.num)}</span><span>${esc(s.label)}${s.gate_name?` <span class="badge gate">${esc(s.gate_name)}</span>`:""}</span><span class="stage-state ${esc(s.status)}">${esc(s.raw_status)}</span></div>`).join("")||'<div class="empty">No pipeline state.</div>';}
function renderChecks(data){$("gate-checks").innerHTML=(data.entries||[]).map(r=>`<div class="receipt"><b>${esc(r.gate)}</b><code>${esc(r.argv_joined)}</code><div class="meta">exit ${esc(r.exit_code)} ? sha256 ${esc(r.stdout_sha256||"n/a")} ? ${esc(r.checked_at||"unknown")}</div></div>`).join("")||'<div class="empty">no recorded checks</div>';}
function renderHumanization(data){if(!data.available){$("humanization").innerHTML='<div class="empty">No humanization record.</div>';return;}const rounds=(data.rounds||[]).map(r=>`<div class="human-round"><span>Round ${esc(r.round)}${r.hold_reason?`<small class="hold"> ? ${esc(r.hold_reason)}</small>`:""}</span><b>${esc(r.violations)} violations</b></div>`).join("");const hold=data.hold_reason?`<div class="hold">Hold: ${esc(data.hold_reason)}</div>`:"";$("humanization").innerHTML=rounds+hold||'<div class="empty">No rounds.</div>';}
function renderPdf(state){const pages=state.pdf_pages||[];$("pdf-panel").hidden=!pages.length;$("pdf").innerHTML=pages.map((url,i)=>`<img class="pdf-page" src="${esc(url)}" alt="PDF page ${i+1}" loading="lazy">`).join("");}
async function renderDeliverable(){const url=`/workspace/${slug}/deliverable/preview.html`;try{const response=await fetch(url);if(!response.ok)throw new Error();$("deliverable-panel").hidden=false;$("deliverable").innerHTML=`<iframe class="viewer" sandbox src="${esc(url)}" title="Deliverable preview"></iframe>`;}catch{$("deliverable-panel").hidden=true;$("deliverable").innerHTML="";}}

function pendingGate(){return (currentState?.stages||[]).find(s=>s.gate&&s.gate_state==="pending");}
function renderActions(){const panel=$("actions-panel");if(!boot.actions_enabled){panel.hidden=true;return;}panel.hidden=false;const gate=pendingGate();let buttons=[];if(gate){buttons.push(["check-gate",`Check ${gate.gate_name}`]);if(["design","draft","understand"].includes(gate.gate_name))buttons.push(["approve-human-gate",`Approve ${gate.gate_name}`]);}buttons.push(["run-content-audit","Run content audit"],["build-bundle","Build bundle"]);$("actions").innerHTML=buttons.map(([kind,label])=>`<button class="button ${kind==="approve-human-gate"?"danger":""}" data-kind="${kind}">${esc(label)}</button>`).join("");document.querySelectorAll("#actions button").forEach(button=>button.onclick=()=>runAction(button.dataset.kind,gate?.gate_name));}
async function runAction(kind,gate){const query=gate?`?gate=${encodeURIComponent(gate)}`:"";const out=$("action-result");out.innerHTML='<div class="result">Running?</div>';try{const data=await json(`/action/${slug}/${kind}${query}`,{method:"POST",headers:{"X-Studio-Token":actionToken}});out.innerHTML=`<div class="result">${esc(JSON.stringify(data.argv))}\nexit: ${esc(data.exit_code)}\n${esc(data.output_tail)}</div>`;await loadDetail();}catch(error){out.innerHTML=`<div class="result">${esc(error.message)}</div>`;}}

async function loadEvents(){if(!slug||paused)return;try{const data=await json(`/workspace/${slug}/events?after=${eventOffset}`);eventOffset=data.next??eventOffset;const rows=(data.events||[]).map(event=>`<div class="event"><time>${esc(event.ts||event.at||event.timestamp||"")}</time><pre>${esc(event.detail||event.kind||JSON.stringify(event))}</pre></div>`).join("");if(rows)$("events").insertAdjacentHTML("afterbegin",rows);if(!$("events").children.length)$("events").innerHTML='<div class="empty">No events.</div>';}catch{}}
function startPolling(){stopPolling();pollTimer=setInterval(loadEvents,5000)}function stopPolling(){if(pollTimer)clearInterval(pollTimer);pollTimer=null;}

$("back").onclick=closeDetail;$("pause").onclick=()=>{paused=!paused;$("pause").textContent=paused?"Resume events":"Pause events";if(!paused)loadEvents();};
$("theme").onclick=()=>{const current=document.documentElement.dataset.theme;const dark=current?current==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.dataset.theme=dark?"light":"dark";localStorage.setItem("studio-theme",document.documentElement.dataset.theme);};
const savedTheme=localStorage.getItem("studio-theme");if(savedTheme)document.documentElement.dataset.theme=savedTheme;
document.addEventListener("keydown",event=>{if(event.target.matches("input,textarea,button"))return;if(event.key==="j"||event.key==="k"){event.preventDefault();const delta=event.key==="j"?1:-1;selected=Math.max(0,Math.min(workspaces.length-1,(selected<0?0:selected)+delta));if(slug)openWorkspace(selected);else{renderCards();document.querySelector(`.card[data-index="${selected}"]`)?.focus();}}else if(event.key==="Enter"&&!slug&&selected>=0)openWorkspace(selected);else if(event.key==="Escape"&&slug)closeDetail();});
$("action-mode").textContent=boot.actions_enabled?"ACTION MODE":"READ ONLY";$("action-mode").classList.toggle("on",boot.actions_enabled);renderCards();
</script>
</body>
</html>
